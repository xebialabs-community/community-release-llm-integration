# Exported from:        http://host.docker.internal:5516/
# Release version:      26.1.0-322.130

---
apiVersion: xl-release/v1
kind: Templates
metadata:
  path: /
  home: AI Tasks Demo
spec:
- template: 6.  Adaptive Orchestration example
  description: |-
    "Demonstrates adaptive orchestration in Digital.ai Release by intentionally
    failing a task, introducing an AI Agent into the running release to assess the
    failure and generate a targeted remediation plan."
  scheduledStartDate: 2026-04-02T09:31:10.357Z
  dueDate: 2026-04-02T10:31:10.357Z
  phases:
  - phase: Prompt
    tasks:
    - name: Simulated MCP failure
      type: community-llm.McpCallTool
      description: "A demo task that triggers a predictable MCP tool-not-found error\
        \ to exercise the release pipeline's failure recovery path. The attached failure\
        \ handler script injects an AI Agent task dynamically into the current phase,\
        \ which then generates context-aware mitigation steps. Together, these form\
        \ a live demonstration of adaptive orchestration — the pipeline reacts intelligently\
        \ to its own failures."
      failureHandler: |-
        # Create LLM Agent task
        agent_task = taskApi.newTask("community-llm.LlmAgent")
        agent_task.title = "Adaptive Recovery Agent"
        agent_task.description = "AI-driven recovery for failed task: %s" % task.title
        agent_task.owner = task.owner

        # --- Set CI References ---
        folder_id = release.folderId

        configs = configurationApi.searchByTypeAndTitle(
            "community-llm.McpServer",
            "Release MCP Server",
            folder_id
        )

        if configs and len(configs) > 0:
            agent_task.mcpServer1 = configs[0]
        else:
            raise Exception("'Release MCP Server configuration' not found in this folder")

        # replace with your model information
        configs = configurationApi.searchByTypeAndTitle(
            "community-llm.DaiLlmModel",
            "Anthropic Sonnet 4.5",
            folder_id
        )

        if configs and len(configs) > 0:
            agent_task.model = configs[0]
        else:
            raise Exception("'Anthropic Sonnet 4.5 configuration' not found in this folder")

        # --- Prompt ---
        prompt_text = """
        You are an autonomous Release Recovery Agent.

        A task has failed.

        FAILED_TASK_ID: %s

        You have access to Release MCP and other configured MCP tools.

        Objectives:
        1. Retrieve the failed task details and last comment.
        2. Extract and analyze the failure message.
        3. Classify the failure.
        4. Determine mitigation steps.

        Rules:
        - Do NOT retry failed tasks unless clearly intermittent connectivity.
        - Do NOT modify production infrastructure automatically.
        - Do NOT create duplicate mitigation tasks.
        - Maximum mitigation tasks allowed: 5.
        - Never create another LLM Agent task.
        - Do NOT user download_file or download_attachemen or complete_task tools.

        If mitigation is required:
        - Create a NEW phase named:
          "Adaptive Recovery "
        - The FIRST task must be:
          Manual Task
          Title: "Approve Adaptive Recovery Plan"
          Assigned to Release Owner
        - All mitigation tasks must be placed after the approval task.

        Perform actions directly using MCP tools.
        Do not output explanations.
        """ % (task.id)

        agent_task.prompt = prompt_text

        # Add task to release
        created_agent = taskApi.addTask(phase.id, agent_task)

        taskApi.skipTask(task.id, 'skip and let the AI Agent handle the failure')

        print("Adaptive Recovery Agent created:", created_agent.id)
      taskFailureHandlerEnabled: true
      taskRecoverOp: RUN_SCRIPT
      capabilities:
      - remote
      server: Release MCP Server
      tool: unavailable_tool
      input: "{}"
  scriptUsername: admin
  scriptUserPassword: !value "xlrelease_Release_6___Adaptive_Orchestration_example_scriptUserPassword"
  riskProfile: Default risk profile

- name: Gemini 2.5 Flash
  type: community-llm.GeminiModel
  apiKey: !value "community_llm_GeminiModel_Gemini_2_5_Flash_apiKey"
- name: Gemini 2.5 Flash-Lite
  type: community-llm.GeminiModel
  apiKey: !value "community_llm_GeminiModel_Gemini_2_5_Flash_Lite_apiKey"
  model_id: gemini-2.5-flash-lite
- name: Gemini 2.5 Pro
  type: community-llm.GeminiModel

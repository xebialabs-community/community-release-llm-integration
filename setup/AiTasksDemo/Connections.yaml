- name: OpenAI GPT 5 mini
  type: community-llm.OpenAiModel
  apiKey: !value "community_llm_OpenAiModel_OpenAI_GPT_5_mini_apiKey"
  model_id: gpt-5-mini
- name: OpenAI GPT 5 nano
  type: community-llm.OpenAiModel
